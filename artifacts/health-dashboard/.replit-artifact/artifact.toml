kind = "web"
previewPath = "/"
title = "Personal Health Dashboard"
version = "1.0.0"
id = "artifacts/health-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22634

[services.development]
run = "pnpm --filter @workspace/health-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-dashboard", "run", "build" ]
publicDir = "artifacts/health-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22634"
BASE_PATH = "/"
